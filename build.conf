# ─────────────────────────────────────────────────────────────────
#  build.conf  —  override defaults for build_live.sh v3.0
#  Place this file alongside build_live.sh
# ─────────────────────────────────────────────────────────────────

# Debian release: bookworm | bullseye | trixie
DEBIAN_RELEASE="sid"

# Architecture: amd64 | arm64 | i386
ARCH="amd64"

# APT mirror (use a local mirror for faster builds)
# MIRROR="http://ftp.de.debian.org/debian"
MIRROR="http://deb.debian.org/debian"

# ISO identity
ISO_LABEL="MY_APP"
ISO_VERSION="1.0.0"
HOSTNAME_LIVE="my-live-box"

# Compression: xz (smallest) | zstd (fastest) | lz4 | gzip
SQUASHFS_COMP="xz"
SQUASHFS_BLOCK="1M"

# Kiosk mode: fullscreen, no alt-tab, crash-restart, cursor hide
# Set to 0 for normal desktop mode
KIOSK_MODE="1"

# Features
ENABLE_SSH="0"
ENABLE_PERSISTENCE="0"

# GRUB timeout in seconds
BOOT_TIMEOUT="5"

# CPU cores for mksquashfs (0 = auto)
PARALLEL_JOBS="$(nproc)"