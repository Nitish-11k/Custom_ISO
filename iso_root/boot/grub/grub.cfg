# GRUB Configuration for D-Secure
set timeout=5
set default=0

# Ensure root is set correctly
search --file --set=root /boot/grub/grub.cfg

# ── Graphics setup ──────────────────────────────

insmod all_video
insmod gfxterm
insmod gfxmenu
insmod png
insmod jpeg
insmod font

# Load fonts needed for the theme
loadfont /boot/grub/DejaVu14.pf2
loadfont /boot/grub/DejaVu16.pf2
loadfont /boot/grub/DejaVuBold16.pf2
loadfont /boot/grub/DejaVuBold48.pf2

set gfxmode=1024x768x32,auto
set gfxpayload=keep

terminal_output gfxterm

# ── Theme setup ─────────────────────────────────
set theme=/boot/grub/themes/dsecure/theme.txt
export theme

# ── Menu Entries ────────────────────────────────

menuentry "D-Secure Drive Eraser" {
    echo "Loading D-Secure System..."
    linux /boot/vmlinuz64 acpi=off noapic nolapic vga=791 console=tty0 console=ttyS0,115200 loglevel=7 base intel_idle.max_cstate=0 idle=poll noswap laptop
    echo "Loading Initramfs..."
    initrd /boot/core_custom.gz /boot/modules64.gz
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}

