set default=0
set timeout=30

# Load video and graphical modules
insmod all_video
insmod gfxterm
insmod png
insmod jpeg
insmod gfxmenu
insmod vbe
insmod vga
loadfont /boot/grub/fonts/unicode.pf2

# Set screen resolution to high quality
set gfxmode=1024x768,auto
terminal_output gfxterm

# Theme Configuration
set theme=($root)/boot/grub/themes/dsecure/theme.txt
export theme

# Fallback Background (if theme fails)
background_image /boot/grub/parrot.jpg

menuentry "D-Secure Drive Eraser" {
    echo "Hello. I am custom iso"
    sleep 2
    # Nuclear Compatibility Mode
    # acpi=off noapic nolapic: Bypasses hardware probing that causes hangs
    # vga=791: Forces a standard VESA mode for early console
    linux /boot/vmlinuz64 quiet loglevel=3 vga=791 nomodeset acpi=off noapic nolapic intel_idle.max_cstate=0 idle=poll noswap laptop
    initrd /boot/core_custom.gz /boot/modules64.gz
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
