# GRUB Configuration for Custom ISO
# Background image + graphical Python app

set timeout=20
set default=0

# ── Graphics setup ──────────────────────────────
insmod vbe
insmod vga
insmod video_bochs
insmod video_cirrus
insmod gfxterm
insmod png

set gfxmode=1024x768x32,800x600x32,auto

if terminal_output gfxterm ; then
    background_image /boot/grub/background.png
fi

# ── GRUB Graphical Theme ────────────────────────────
# Load our custom graphical theme containing the title, black borders, and dark blue selection
loadfont /boot/grub/themes/custom/font.pf2
set theme=/boot/grub/themes/custom/theme.txt

# ── Menu Entries ────────────────────────────────
# D-Secure Boot Menu

menuentry "D-Secure Drive Eraser" {
    echo "Loading D-Secure System..."
    background_image /boot/grub/background.png
    linux /boot/vmlinuz64 quiet loglevel=0 cde tce=cde waitusb=20 vga=791 logo.nologo vt.global_cursor_default=0 consoleblank=0 console=ttyS0 showapps noswap
    initrd /boot/core_custom.gz /boot/modules64.gz
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
