# GRUB Configuration for Custom ISO
# Background image + graphical Python app

set timeout=20
set default=0

# ── Graphics setup ──────────────────────────────
insmod vbe
insmod vga
insmod video_bochs
insmod video_cirrus
insmod gfxterm
insmod png

set gfxmode=1024x768x32,800x600x32,auto

if terminal_output gfxterm ; then
    background_image /boot/grub/background.png
fi

# ── Menu colors ─────────────────────────────────
set menu_color_normal=dark-gray/black
set menu_color_highlight=green/white
set color_normal=dark-gray/black
set color_highlight=green/white

# ── Menu Entries ────────────────────────────────

menuentry ">> Launch Custom Dashboard <<" {
    echo "Loading System..."
    linux /boot/vmlinuz64 loglevel=3 cde tce=cde waitusb=20 vga=791 showapps noswap
    initrd /boot/core_custom.gz /boot/modules64.gz
}

menuentry ">> DEBUG MODE (Use if mouse/keyboard fail) <<" {
    echo "Loading System in Debug/Compatibility Mode..."
    # Removed potential killers like acpi=off
    # Added libinput.force_polling for tricky touchpads
    # Added debug for verbose dmesg
    linux /boot/vmlinuz64 debug cde tce=cde waitusb=20 vga=791 showapps libinput.force_polling=1
    initrd /boot/core_custom.gz /boot/modules64.gz
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}
