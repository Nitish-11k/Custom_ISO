# GRUB Configuration for Custom ISO
# Background image + graphical Python app

set timeout=20
set default=0

# ── Graphics setup ──────────────────────────────
insmod vbe
insmod efi_gop
insmod efi_uga
insmod vga
insmod video_bochs
insmod video_cirrus
insmod gfxterm
insmod png
insmod jpeg

set gfxmode=1024x768x32,800x600x32,auto

if terminal_output gfxterm ; then
    background_image /boot/grub/background.jpg
fi

# ── Menu colors ─────────────────────────────────
set menu_color_normal=dark-gray/black
set menu_color_highlight=green/white
set color_normal=dark-gray/black
set color_highlight=green/white

# ── Menu Entries ────────────────────────────────

menuentry ">> Launch Custom Dashboard <<" {
    echo "Loading D-Secure System Core..."
    linux /boot/vmlinuz64 console=tty0 console=ttyS0 quiet loglevel=3 vga=791  noswap laptop
    initrd /boot/core_custom.gz /boot/modules64.gz
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}
