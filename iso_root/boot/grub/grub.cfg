# GRUB Configuration for D-Secure (VERBOSE & DEBUG)
set timeout=1
set default=0

# ── Graphics setup ──────────────────────────────
insmod vbe
insmod vga
insmod video_bochs
insmod video_cirrus
insmod gfxterm
insmod png

set gfxmode=1024x768x32,auto
set gfxpayload=keep

if terminal_output gfxterm ; then
    background_image /boot/grub/background.png
fi

# ── Menu Entries ────────────────────────────────

menuentry ">> Launch D-Secure Dashboard <<" {
    echo "Loading D-Secure System..."
    # 'base' tells TC to only use what's in initramfs (skip searching for TCE)
    # 'loglevel=7' for maximum verbosity
    linux /boot/vmlinuz64 acpi=off noapic nolapic vga=791 console=tty0 console=ttyS0,115200 loglevel=7 base intel_idle.max_cstate=0 idle=poll noswap laptop
    echo "Loading Initramfs..."
    initrd /boot/core_custom.gz /boot/modules64.gz
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}
